<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valhalla II</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Flash overlay for win/lose -->
  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- Title Bar -->
  <div class="title-bar">
    <div class="title-bar-left">
      <span class="title-bar-logo">&#9670;</span>
      <span class="title-bar-text">VALHALLA II</span>
    </div>
    <div class="title-bar-controls">
      <button class="title-btn" id="btnMinimize">&#x2500;</button>
      <button class="title-btn" id="btnMaximize">&#x25A1;</button>
      <button class="title-btn title-btn-close" id="btnClose">&times;</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content">

    <!-- Live Action Feed -->
    <div class="action-bar" id="actionBar">
      <span class="action-dot"></span>
      <span class="action-text" id="actionText">Initializing...</span>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">BALANCE</div>
        <div class="stat-value" id="balance">$0.00</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-label">SESSION P&L</div>
        <div class="stat-value" id="sessionPnl">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">BETS</div>
        <div class="stat-value" id="betCount">0W / 0L</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">UNIT</div>
        <div class="stat-value" id="unitInfo">1x</div>
      </div>
    </div>

    <!-- Current Round (scrolling results) -->
    <div class="section glass">
      <div class="section-header">LIVE FEED</div>
      <div class="feed-row" id="feedRow">
        <span class="feed-cursor"></span>
      </div>
    </div>

    <!-- Shoe History (scrollable sets) -->
    <div class="section glass shoe-section">
      <div class="section-header">SHOE HISTORY</div>
      <div class="shoe-grid" id="shoeGrid">
        <div class="shoe-empty">No sets completed yet</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-start" id="btnStart">START</button>
      <button class="btn btn-stop" id="btnStop" disabled>STOP</button>
      <button class="btn btn-gear" id="btnSettings">&#x2699;</button>
    </div>

    <!-- Log Toggle -->
    <div class="log-bar">
      <span class="log-toggle" id="logToggle">CONSOLE &#x25BC;</span>
    </div>
    <div class="log-panel hidden" id="logPanel">
      <div class="log-content" id="logContent"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal hidden" id="settingsModal">
    <div class="modal-content glass">
      <div class="modal-header">
        <h2>SETTINGS</h2>
        <button class="modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>License Key</label>
          <input type="text" id="inputLicense" placeholder="XXXX-XXXX-XXXX-XXXX">
        </div>
        <div class="form-group">
          <label>Chip Base ($)</label>
          <input type="number" id="inputChipBase" value="1" min="0.5" step="0.5">
        </div>
        <div class="form-group">
          <label>Loss Cut (chips)</label>
          <input type="number" id="inputLossCut" value="200" min="50" step="50">
        </div>
        <div class="form-group">
          <label>Telegram Chat ID</label>
          <input type="text" id="inputTelegramChat" placeholder="Optional">
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="inputDryRun"> Dry Run (no real bets)
          </label>
        </div>
        <button class="btn btn-start" id="btnSaveSettings" style="width:100%;margin-top:12px;">SAVE</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
